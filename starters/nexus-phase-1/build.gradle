plugins {
    id 'java'
    id 'application'
}

group = 'com.nexus'
version = '0.1.0'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
}

application {
    mainClass = 'com.nexus.Main'
}

tasks.named('test') {
    useJUnitPlatform()
}
